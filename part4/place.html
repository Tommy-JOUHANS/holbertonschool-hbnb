<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>
    <main>
        <h1 id="place-title">Place Details</h1>

        <!-- div : contenu 100% dynamique, pas de heading fixe -->
        <div id="place-details" class="place-details">
            <!-- Place info will be populated dynamically -->
        </div>

        <!-- div : le <h2>Reviews</h2> est injecté par le JS, pas statique -->
        <div id="reviews">
            <!-- Reviews will be populated dynamically -->
        </div>

        <!-- section valide : elle a un vrai <h2> statique -->
        <section id="add-review" class="add-review">
            <h2>Add a Review</h2>
            <a id="add-review-link" href="#" class="details-button">
                <img src="images/icon-comment.png" alt="Comment Logo" class="comment-icon">
                Write a Review
            </a>
        </section>
    </main>
    <footer>
        <p>&#169; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
