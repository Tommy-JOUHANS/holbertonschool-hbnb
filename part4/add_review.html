<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <h1 id="review-place-title">Reviewing: Place Name</h1>

        <section class="add-review">
            <h2>Add a Review</h2>
            <form class="form" id="review-form">
                <label for="review">Your Review:</label>
                <textarea id="review" name="review" required></textarea>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="" disabled selected>-- Choose a rating --</option>
                    <option value="1">1 Star</option>
                    <option value="2">2 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="5">5 Stars</option>
                </select>

                <!-- Message d'erreur/succès inline (affiché par showMessage) -->
                <div id="review-error" style="display:none;"></div>

                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&#169; 2026 HBnB Evolution. All rights reserved. Tommy JOUHANS.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
