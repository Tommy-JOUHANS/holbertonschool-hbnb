<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <section id="filter">
            <h2 id="page-title">List of Places</h2>
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="150">$150</option>
                <option value="200">$200</option>
            </select>
        </section>

        <!-- div au lieu de section : conteneur dynamique sans sémantique de section -->
        <div id="places-list">
            <!-- List of places will be populated dynamically -->
        </div>

        <div id="pagination"></div>
    </main>

    <footer>
        <p>&#169; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
