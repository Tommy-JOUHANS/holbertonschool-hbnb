<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <section id="login-section">
            <form id="login-form">
                <h2>Login</h2>

                <!-- Message d'erreur inline (affiché par showMessage) -->
                <div id="login-error" style="display:none;"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">

                <button type="submit">Login</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&#169; 2026 HBnB Evolution. All rights reserved. Tommy JOUHANS.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
